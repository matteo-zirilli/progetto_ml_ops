name: Sync to Hugging Face Space

# L'action parte sul push nel main
on:
  push:
    branches: [main]
  workflow_dispatch: # permette di farlo partire anche a mano se serve

# 2. COSA DEVE FARE?
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest # Gli do un computer Linux virtuale su cui lavorare
    steps:
      - uses: actions/checkout@v3 # Scarica il codice da GitHub
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # Prende la chiave
        run: |
          git remote add space https://user:$HF_TOKEN@huggingface.co/spaces/matteozirilli/sentiment-api-fastapi
          git push --force space main