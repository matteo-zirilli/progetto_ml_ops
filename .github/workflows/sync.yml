name: MLOps Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Scarico il codice da Github
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # Preparo Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Installo le librerie 
      - name: Install requirements
        run: |
          pip install --no-cache-dir --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt

      # Eseguo gli script di ML in ordine
      - name: Run ML Pipeline
        run: |
          python -m train.train_model
          python -m train.eval_baseline
          python -m train.eval_finetuned

      # Eseguo il confronto fra i modelli
      - name: Run Gate Check
        run: |
          python gate_check.py

      - name: Run API Test
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_main.py



      # Preparazione del modello vincitore
      - name: Prepare Production Model
        run: |
          # Leggo chi ha vinto
          WINNER=$(cat winner.txt)
          echo "Il vincitore decretato dal gate è: $WINNER"

          
      # Push verso Hugging Face
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Autenticazione su Git
          git config --global user.email "bot@github.actions"
          git config --global user.name "GitHub Actions"



          # Cancello i checkpoint inutili e pesanti perché altrimenti non riesco a fare il push su HF per lo spazio limitato
            rm -rf models/model_fine_tuned/checkpoint-* || true
            
            # Attivo la gestione dei file giganti con git lfs
            git lfs install
            git lfs track "*.safetensors"
            git lfs track "*.bin"
            git lfs track "*.pt"
            git add .gitattributes


          
          # Aggiungo tutto (compreso il nuovo winner.txt e il modello finetuned)
          git add .

          git add -f models/ || true #aggiungo questo comando perché la cartella "models" è nel file gitignore e non la porto su Github perché è pesante, tuttavia mi serve nel funzionamento dell'app quindi deve arrivare su HF, quindi la forzo.
          git commit -m "Deploy automatico. Vincitore: $(cat winner.txt)"
          
          # Aggiungo il remote al mio Space e forzo il push
          git remote add space https://user:$HF_TOKEN@huggingface.co/spaces/matteozirilli/sentiment-api-fastapi
          git push --force space main